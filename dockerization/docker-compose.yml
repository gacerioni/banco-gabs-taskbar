version: '3.8'

services:
  # Redis Stack (with RediSearch and RedisJSON)
  redis:
    image: redis/redis-stack:latest
    container_name: redis-global-demo-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1000 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redis-global-demo-network

  # Application
  app:
    build:
      context: ..
      dockerfile: dockerization/Dockerfile
    container_name: redis-global-demo-app
    ports:
      - "8092:8092"
    environment:
      # Redis connection
      - REDIS_URL=redis://redis:6379
      
      # App settings
      - APP_HOST=0.0.0.0
      - APP_PORT=8092
      - DEBUG=false

      # CORS
      - CORS_ORIGINS=http://localhost:8092,http://127.0.0.1:8092
      
      # Models
      - ROUTER_MODEL_NAME=paraphrase-multilingual-MiniLM-L12-v2
      - SEARCH_MODEL_NAME=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      
      # Search weights
      - FTS_WEIGHT=0.7
      - VSS_WEIGHT=0.3
      
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8092/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - redis-global-demo-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  redis-global-demo-network:
    driver: bridge

