<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Inter - Busca Global</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🏦</span>
                <h1>Banco Inter</h1>
            </div>
            <p class="subtitle">Busca Global • Customer 360</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="O que você procura? (Pix, boleto, iPhone, investimentos...)"
                    autocomplete="off"
                >
                
                <!-- Autocomplete Dropdown -->
                <div id="autocompleteDropdown" class="autocomplete-dropdown hidden"></div>
            </div>
            
            <!-- Loading indicator -->
            <div id="loadingIndicator" class="loading hidden">
                <div class="spinner"></div>
                <span>Buscando...</span>
            </div>

            <!-- Search Info -->
            <div id="searchInfo" class="search-info hidden"></div>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer" class="results-container"></div>

        <!-- Quick Access Buttons -->
        <div class="quick-access">
            <h3>🚀 Acesso Rápido</h3>
            <div class="quick-buttons">
                <button class="quick-btn" data-query="pix">💸 Pix</button>
                <button class="quick-btn" data-query="pagar boleto">📄 Boleto</button>
                <button class="quick-btn" data-query="fatura">🧾 Fatura</button>
                <button class="quick-btn" data-query="investimentos">📈 Investir</button>
                <button class="quick-btn" data-query="iphone">📱 iPhone</button>
                <button class="quick-btn" data-query="notebook">💻 Notebook</button>
                <button class="quick-btn" data-query="emprestimo">💰 Empréstimo</button>
                <button class="quick-btn" data-query="seguro">🛡️ Seguros</button>
            </div>
        </div>

        <!-- Performance Stats (Collapsible) -->
        <details class="stats-details">
            <summary>📊 Performance & Debug Info</summary>
            <div id="statsContent" class="stats-content">
                <div class="stat-item">
                    <span class="stat-label">Última busca:</span>
                    <span id="lastQuery">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Latência:</span>
                    <span id="latency">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Intent detectado:</span>
                    <span id="intent">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Resultados:</span>
                    <span id="resultCount">-</span>
                </div>
            </div>
        </details>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
